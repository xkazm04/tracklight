apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lighttrack.fullname" . }}
  labels:
    {{- include "lighttrack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lighttrack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lighttrack.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["lighttrack-api"]
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: LIGHTTRACK_BIND
              value: {{ .Values.config.bind | quote }}
            - name: LIGHTTRACK_AUTH_MODE
              value: {{ .Values.config.authMode | quote }}
            - name: LIGHTTRACK_DB
              value: {{ .Values.config.dbPath | quote }}
            - name: LIGHTTRACK_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lighttrack.fullname" . }}
                  key: admin-key
            {{- if .Values.secrets.databaseUrl }}
            - name: LIGHTTRACK_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lighttrack.fullname" . }}
                  key: database-url
            {{- end }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "lighttrack.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "lighttrack.fullname" . }}
  labels:
    {{- include "lighttrack.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
